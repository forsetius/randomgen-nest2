name: Promote to production

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release id produced by the staging workflow
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Assert required production secrets, variables, and input
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MYDEVIL_SSH_PRIVATE_KEY }}
          RUNTIME_ENV: ${{ secrets.RANDOMGEN_RUNTIME_ENV }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          [ -n "${RELEASE_ID:-}" ] || { echo "Missing input: release_id"; exit 1; }
          [ -n "${SSH_PRIVATE_KEY:-}" ] || { echo "Missing secret: MYDEVIL_SSH_PRIVATE_KEY"; exit 1; }
          [ -n "${RUNTIME_ENV:-}" ] || { echo "Missing secret: RANDOMGEN_RUNTIME_ENV"; exit 1; }
          [ -n "${{ vars.MYDEVIL_HOST }}" ] || { echo "Missing variable: MYDEVIL_HOST"; exit 1; }
          [ -n "${{ vars.MYDEVIL_USER }}" ] || { echo "Missing variable: MYDEVIL_USER"; exit 1; }
          [ -n "${{ vars.MYDEVIL_DOMAIN }}" ] || { echo "Missing variable: MYDEVIL_DOMAIN"; exit 1; }
          [ -n "${{ vars.APP_URL }}" ] || { echo "Missing variable: APP_URL"; exit 1; }

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MYDEVIL_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ vars.MYDEVIL_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519

      - name: Upload production env
        env:
          RUNTIME_ENV: ${{ secrets.RANDOMGEN_RUNTIME_ENV }}
        run: |
          remote="${{ vars.MYDEVIL_USER }}@${{ vars.MYDEVIL_HOST }}"
          ssh "$remote" "mkdir -p ~/apps/randomgen/production/incoming"
          printf '%s\n' "$RUNTIME_ENV" > runtime.env
          scp runtime.env "$remote:~/apps/randomgen/production/incoming/runtime.env"

      - name: Promote release and restart production
        env:
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          remote="${{ vars.MYDEVIL_USER }}@${{ vars.MYDEVIL_HOST }}"
          ssh "$remote" "RELEASE_ID='$RELEASE_ID' DOMAIN='${{ vars.MYDEVIL_DOMAIN }}' bash -s" <<'REMOTE'
          set -euo pipefail

          app_base="$HOME/apps/randomgen/production"
          releases_base="$HOME/apps/randomgen/releases"
          release_dir="$releases_base/$RELEASE_ID"
          domain_app_js="$HOME/domains/$DOMAIN/public_nodejs/app.js"

          [ -d "$release_dir" ] || { echo "Shared release not found: $release_dir"; exit 1; }

          mkdir -p "$app_base/shared" "$app_base/incoming" "$(dirname "$domain_app_js")"

          mv "$app_base/incoming/runtime.env" "$app_base/shared/runtime.env"
          chmod 600 "$app_base/shared/runtime.env"

          cat > "$domain_app_js" <<'APPJS'
          const fs = require('node:fs');
          const path = require('node:path');

          const applicationBase = path.join(process.env.HOME, 'apps/randomgen/production');
          const releasesBase = path.join(process.env.HOME, 'apps/randomgen/releases');
          const runtimeEnvironmentPath = path.join(applicationBase, 'shared/runtime.env');
          const currentReleasePath = path.join(applicationBase, 'current-release');

          function loadRuntimeEnvironment(filePath) {
            const content = fs.readFileSync(filePath, 'utf8');

            for (const rawLine of content.split(/\r?\n/)) {
              const line = rawLine.trim();

              if (line.length === 0 || line.startsWith('#')) {
                continue;
              }

              const separatorIndex = line.indexOf('=');

              if (separatorIndex === -1) {
                continue;
              }

              const key = line.slice(0, separatorIndex).trim();
              const value = line.slice(separatorIndex + 1).trim().replace(/^"(.*)"$/, '$1');

              process.env[key] = value;
            }
          }

          loadRuntimeEnvironment(runtimeEnvironmentPath);

          const releaseName = fs.readFileSync(currentReleasePath, 'utf8').trim();
          const releaseDirectory = path.join(releasesBase, releaseName);

          process.chdir(releaseDirectory);
          require(path.join(releaseDirectory, 'dist/main.js'));
          APPJS

          printf '%s\n' "$RELEASE_ID" > "$app_base/current-release.tmp"
          mv "$app_base/current-release.tmp" "$app_base/current-release"

          devil www restart "$DOMAIN"
          REMOTE

      - name: Smoke test
        run: curl --retry 10 --retry-delay 2 --retry-all-errors --fail --show-error --silent "${{ vars.APP_URL }}/ping"

      - name: Publish release summary
        env:
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          {
            echo "### Production release"
            echo
            echo "- release_id: \`$RELEASE_ID\`"
            echo "- url: ${{ vars.APP_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
