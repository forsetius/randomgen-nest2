template: menu-topbar
class: test-menu
menu:
  # SimpleMenuPoz
  - title: PozA
    url: "@{pl/poz-a}"

  # SimpleSubMenu
  - title: PozB
    items:
      - title: PozB_Podpoz1
        url: "@{pl/poz-b/podpoz-1}"
      - title: PozB_Podpoz2
        url: "@{pl/poz-b/podpoz-2}"

  # RichSubMenu
  - title: PozC
    url: "@{pl/poz-c}"
    text: "PozC summary text"
    columns:
      - title: PozC_Kol1
        text: "PozC column 1 lead"
        items:
          - title: PozC_Kol1_Poz1
            url: "@{pl/poz-c/column1/poz1}"
            text: "PozC_Kol1_Poz1 opis"
          - title: PozC_Kol1_Poz2
            url: "@{pl/poz-c/column1/poz2}"
      - title: PozC_Kol2
        url: "@{pl/poz-c/column2}"
        text: "PozC column 2 lead"
        colspan: 2
        repeatTitle: true
        items:
          - title: PozC_Kol2_Poz1
            url: "@{pl/poz-c/column2/poz1}"
          - title: PozC_Kol2_Poz2
            url: "@{pl/poz-c/column2/poz2}"
            text: "PozC_Kol2_Poz2 opis"

  # SeparatorMenuPoz
  - separator: "|"

  # LabelMenuPoz
  - label: "PozLabel"

  # Another SimpleMenuPoz to follow label/separator
  - title: PozD
    url: "@{pl/poz-d}"
