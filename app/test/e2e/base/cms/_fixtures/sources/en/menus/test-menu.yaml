template: menu-topbar
class: test-menu
menu:
  # SimpleMenuItem
  - title: ItemA
    url: "@{en/index}"

  # SimpleSubMenu
  - title: ItemB
    items:
      - title: ItemB_Subitem1
        url: "@{en/item-b_subitem-1}"
      - title: ItemB_Subitem2
        url: "@{en/item-b_subitem-2}"

  # RichSubMenu
  - title: ItemC
    url: "@{en/item-c}"
    text: "ItemC summary text"
    columns:
      - title: ItemC_Column1
        text: "ItemC column 1 lead"
        items:
          - title: ItemC_Column1_Item1
            url: "@{en/item-c_column1_item1}"
            text: "ItemC_Column1_Item1 description"
          - title: ItemC_Column1_Item2
            url: "@{en/item-c_column1_item2}"
      - title: ItemC_Column2
        url: "@{en/item-c_column2}"
        text: "ItemC column 2 lead"
        colspan: 2
        repeatTitle: true
        items:
          - title: ItemC_Column2_Item1
            url: "@{en/item-c_column2_item1}"
            text: "ItemC_Column2_Item2 description"

  # SeparatorMenuItem
  - separator: "|"

  # LabelMenuItem
  - label: "ItemLabel"

  # Another SimpleMenuItem to follow label/separator
  - title: ItemD
    url: "@{en/item-d}"
