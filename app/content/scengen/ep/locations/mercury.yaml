description:
  pl: "Merkury to prawdziwa kwintesencja pustyni: zakurzona, sucha i nieustannie prażona\
    \ przez \nSłońce. Główne filary działalności gospodarczej to wydobycie i energia\
    \ słoneczna. Ponieważ \nMerkury jest opustoszały i rzadko zaludniony, doskonale\
    \ nadaje się również do ukrywania \ndziałań, których nie powinny dostrzec ciekawskie\
    \ oczy.\n"
  en: "Mercury is the true epitome of a desert: dusty, dry, and constantly scorched\
    \ by the Sun. \nThe main pillars of economic activity are mining and solar energy.\
    \ Since Mercury is \ndesolate and sparsely populated, it is also well suited for\
    \ hiding activities that \ncurious eyes should not see.\n"
