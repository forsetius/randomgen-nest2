description:
  pl:
    "Solarne centrum otwartych badań nad Słońcem. Hooverman-Geischecker to wspólne\
    \ przedsięwzięcie \nArgonautów i Autonomicznego Uniwersytetu Tytana, które sponsoruje\
    \ dziesiątki projektów badawczych. \nW przeciwieństwie do Atenu, panuje tu stosunkowo\
    \ otwarta kultura, a zarządzanie odbywa się według \nzasad nanosocjalizmu.\n"
  en:
    "A solar center for open research on the Sun. Hooverman-Geischecker is a joint\
    \ venture of the \nArgonauts and the Autonomous University of Titan, sponsoring\
    \ dozens of research projects. Unlike \nAten, it has a relatively open culture,\
    \ and governance is based on the principles of nanosocialism.\n"
