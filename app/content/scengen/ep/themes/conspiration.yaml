description:
  pl: "W Eclipse Phase istnieją zarówno realnych spisków jak i mnogość teorii spiskowych.\
    \ Swoje ukryte agendy mają \nzarówno konspiracje pokroju Zapory czy Projektu Ozma,\
    \ służby specjalne poszczególnych ustrojów Układu Słonecznego \nale również hiperkorporacje\
    \ czy różne ruchy społeczne.\n"
  en: "In Eclipse Phase, there are both real conspiracies and a multitude of conspiracy\
    \ theories. Conspiracies such as \nthe Firewall and Project Ozma, the secret services\
    \ of individual Solar System powers, as well as \nhypercorporations and various\
    \ social movements all have their hidden agendas.\n"
