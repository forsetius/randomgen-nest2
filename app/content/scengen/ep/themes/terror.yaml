kind: theme
id: terror
name:
  pl: Groza
  en: Terror
parentId: null
importance: 1
description:
  pl: "Groza przyjmuje wiele form, jednak w Eclipse Phase najczęściej jest to groza\
    \ psychologiczna. Postaci w tym \nświecie stają przecież czoła niepewności przetrwania\
    \ (zarówno własnego, jak i przetrwania całego gatunku), \nstrachu przed nieznanym,\
    \ poczuciu przejmującej pustki i obojętności Wszechświata... Czasem strachy przyjmują\
    \ \nformę realną i postaci spotykają pośród gwiazd Rzeczy i Istoty, których być\
    \ nie powinno czy odpychających Obcych.\nA przede wszystkim są świadkami krzywd\
    \ i niesprawiedliwości, jakie transludzie są w stanie wyrządzić sobie \nnawzajem\
    \ - a pośród pustki Kosmosu, gdy wydaje się, że żadne społeczeństwo nie patrzy\
    \ i nie ocenia, są to rzeczy \nprzejmujące i straszne.\n\nMimo wszystkich zdobyczy\
    \ nauki i techniki, którymi rozporządzają transludzie, wciąż nieobca jest im groza\
    \ \ndopadająca ich, gdy ktoś odbierze im kontrolę nad własną tożsamością - co\
    \ nie jest rzadkie w dobie kopiowania \nEgo i chaosu Upadku. Wielu transludzi\
    \ odchodzi od zmysłów, gdy przemiany kulturowe i technologiczne wstrząsną \nich\
    \ postrzeganiem świata - a to przecież przy tym tempie rozwoju zdarza się coraz\
    \ częściej. Są też tacy, którzy \nzbyt głęboko wzięli sobie do serca maksymę \"\
    umysł to software - zaprogramuj go\" i przeholowali z edycją, gubiąc \nswoją osobowość.\n"
  en: "Horror takes many forms, but in Eclipse Phase it is most often psychological\
    \ horror. After all, the characters \nin this world face uncertainty about survival\
    \ (both their own and that of the entire species), fear of the \nunknown, a sense\
    \ of poignant emptiness and the indifference of the Universe... Sometimes these\
    \ fears take on a \nreal form, and characters encounter Things and Beings among\
    \ the stars that should not exist, or repulsive Aliens. \nAbove all, they witness\
    \ the harm and injustice that transhumans are capable of inflicting on each other\
    \ – and in \nthe emptiness of space, when it seems that no society is watching\
    \ or judging, these things are poignant and \nterrifying.\n\nDespite all the scientific\
    \ and technological advances at their disposal, transhumans are still familiar\
    \ with the \nterror that befalls them when someone takes away their control over\
    \ their own identity – which is not uncommon \nin the age of Ego copying and the\
    \ chaos of the Fall. Many transhumans lose their minds when cultural and \ntechnological\
    \ changes shake their perception of the world – and at this rate of development,\
    \ this is happening \nmore and more often. There are also those who have taken\
    \ the maxim \"the mind is software – program it\" too \ndeeply to heart and have\
    \ gone too far with editing, losing their personality.\n"
