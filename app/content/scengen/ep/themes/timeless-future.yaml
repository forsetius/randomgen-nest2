kind: theme
id: timeless-future
name:
  pl: Ponadczasowa przyszłość
  en: Timeless future
parentId: null
importance: 1
description:
  pl: "Mimo że akcja Eclipse Phase toczy się w odległej przyszłości, wiele elementów\
    \ tego świata jest \nznajomych i nawiązuje do współczesnej kultury. W świecie\
    \ tym istnieje wiele odniesień do popkultury \nXX i XXI wieku, a także do historii\
    \ ludzkości. Dzięki temu świat ten wydaje się bardziej realny i \nprzystępny dla\
    \ graczy.\n"
  en: "Although the action of Eclipse Phase takes place in the distant future, many\
    \ elements of this world are \nfamiliar and refer to contemporary culture. This\
    \ world contains many references to 20th and 21st century \npop culture, as well\
    \ as to human history. This makes the world feel more real and accessible to players.\n"
